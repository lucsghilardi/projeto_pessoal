name: projeto_pessoal

services:
  postgres:
    image: postgres:16
    container_name: projeto_pessoal_postgres
    # Lê POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD do .env do Laravel.
    env_file:
      - ./backend/laravel/.env
    ports:
      # Exposto na 5433 no host para não conflitar com outros Postgres na 5432.
      # O backend acessa pela rede interna do compose em postgres:5432.
      - "5433:5432"
    volumes:
      - projeto_pessoal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: projeto_pessoal_backend
    working_dir: /var/www/laravel
    # O Laravel lê o arquivo .env montado via volume (sem env_file aqui, para
    # que APP_KEY / JWT_SECRET gerados depois não sejam mascarados pelo ambiente).
    environment:
      PHP_CLI_SERVER_WORKERS: 4
    command: >
      php
      -d upload_max_filesize=128M
      -d post_max_size=128M
      -d memory_limit=512M
      artisan serve --host=0.0.0.0 --port=8000
    volumes:
      - ./backend:/var/www
    ports:
      # 8001 no host (8000 já é usado por outro projeto). Interno continua 8000.
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    container_name: projeto_pessoal_frontend
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001/api
      INTERNAL_API_URL: http://backend:8000/api
    command: sh -c "npm install --include=optional && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      # 3001 no host (3000 já é usado por outro projeto). Interno continua 3000.
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  projeto_pessoal_pgdata:
    name: projeto_pessoal_pgdata
  frontend_node_modules:
    name: projeto_pessoal_frontend_node_modules
